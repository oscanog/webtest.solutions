limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name bugcatcher.example.com www.bugcatcher.example.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bugcatcher.example.com www.bugcatcher.example.com;

    root /var/www/bugcatcher/current;
    index index.php index.html;
    client_max_body_size 12m;

    ssl_certificate /etc/letsencrypt/live/bugcatcher.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bugcatcher.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:bugcatcher_ssl:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /setup.php {
        deny all;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(sql|bak|env)$ {
        deny all;
    }

    location ~ ^/register-passed-by-maglaque/(login|signup)\.php$ {
        limit_req zone=auth_limit burst=20 nodelay;
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }
}
